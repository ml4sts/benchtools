- name: product
  template: "find the product of {a} and {b}"
  values:
     a: [2,3,5]
     b: [3,4,5]
  reference: calculated
  scorer: "calculated_answer"
  format: "IntAnswer"
- name: product_id
  id_generator: selector_id_generator
  template: "find the product of {a} and {b}"
  values:
     a: [2,3,5]
     b: [3,4,5]
     id: [a,b,c]
  reference: calculated
  scorer: "calculated_answer"
  format: "IntAnswer"
- name: symbol
  template: "what is the name for the following symbol? {symb}"
  values: 
     symb: ["@","$","#"]
     exmeta: ['internet', 'world', 'internet']
  reference: ["at", "dollar sign", "pound"]
  scorer: "contains"
- name: symbol_id
  id_generator: selector_id_generator
  template: "what is the name for the following symbol? {symb}"
  values: 
     symb: ["@","$","#"]
     exmeta: ['internet', 'world', 'internet']
     id: [at, dollar,pound]
  reference: ["at", "dollar sign", "pound"]
  scorer: "contains"

